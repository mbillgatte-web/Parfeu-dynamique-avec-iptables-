{% load static %}
<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Netfilter - Authentification</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="{% static 'css/conn.css' %}">
  <style>
  
  </style>
</head>
<body>

    <!-- Conteneur principal -->
    <div class="flex w-4/5 max-w-7xl bg-white rounded-2xl shadow-2xl overflow-hidden relative">

        <!-- Streak diagonal -->
        <div class="glow-streak"></div>

            <!-- Partie gauche (logo) -->
            <div class="hidden md:flex md:w-1/2 bg-gray-900 items-center justify-center p-8 slide-top">
                <div class="text-center">
                    <i class="fas fa-shield-alt text-6xl text-indigo-500 mb-4"></i>
                    <h1 class="text-3xl font-bold text-white">FireGate </h1>
                    <p class="text-gray-300 mt-2">Sécurité & Contrôle Réseau</p>
                </div>
            </div>

            <!-- Partie droite (formulaire + glow) -->
            <div class="w-full md:w-2/3 p-12 slide-bottom form-wrapper">

                <!-- Formulaire -->
                <form id="login-form" method="POST" action="{% url 'connexion' %}" class="relative z-10 bg-white p-12 rounded-2xl shadow-2xl space-y-6">
                    {% csrf_token %}
                    <div class="rounded-md shadow-md space-y-4">
                        <div>
                            <input id="login-email" name="email" type="email" required
                            class="appearance-none block w-full px-4 py-4 border border-gray-300 placeholder-gray-500 text-gray-900 rounded-md focus:outline-none focus:ring-indigo-500 focus:border-indigo-500 sm:text-sm"
                            placeholder="Email">
                        </div>
                    
                        <div class="relative">
                            <input id="login-password" name="password" type="password" required
                            class="appearance-none block w-full px-4 py-4 border border-gray-300 placeholder-gray-500 text-gray-900 rounded-md focus:outline-none focus:ring-indigo-500 focus:border-indigo-500 sm:text-sm"
                            placeholder="Mot de passe">
                            <button type="button" id="login-toggle-password" class="absolute right-3 top-3 text-gray-500">
                            <i class="fas fa-eye"></i>
                            </button>
                        </div>
                    </div>

                    <div class="flex items-center justify-between">
                        <div class="flex items-center">
                            <input id="remember-me" name="remember-me" type="checkbox"
                            class="h-4 w-4 text-indigo-600 focus:ring-indigo-500 border-gray-300 rounded">
                            <label for="remember-me" class="ml-2 block text-sm text-gray-900">
                            Se souvenir de moi
                            </label>
                        </div>

                        <div class="text-sm">
                            <a href="#" class="font-medium text-indigo-600 hover:text-indigo-500">
                            Mot de passe oublié?
                            </a>
                        </div>
                    </div>

                  
                    <button type="submit"
                        class="group relative w-full flex justify-center py-4 px-4 border border-transparent 
                        text-sm font-medium rounded-md text-white bg-indigo-600 hover:bg-indigo-700 
                        focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500 transition-all duration-200">
                        <span class="absolute left-0 inset-y-0 flex items-center pl-3">
                        <i class="fas fa-sign-in-alt"></i>
                        </span>
                        Se connecter
                    </button>
                          <!-- Conteneur pour le message d'erreur -->
                        <div id="login-error" class="mt-2 text-red-500 text-sm text-center animate-shake">
                          {% if error %}{{ error }}{% endif %}
                        </div>
                 
                </form>
            </div>

        </div>
    </div>

  <!-- Script JS -->
  <script src="{% static "javascript/conn.js" %}"></script>
</body>
</html>
